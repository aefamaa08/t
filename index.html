<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение</title>

  <!-- Шрифты -->
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="screen">

<div class="invite">
  <div class="invite-content">

    <div class="top-letter">Н</div>

    <div class="name-block">
      <div class="name script">Iroda</div>

      <div class="divider">
        <span></span>
        <i>&</i>
        <span></span>
      </div>

      <div class="name script">Azamat</div>
    </div>

    <div class="bottom-letter">Ж</div>

  </div>
</div>
</div>
    <div class="timer">
      <div class="time"><span id="w">00</span><small>недель</small></div>
      <div class="time"><span id="d">00</span><small>дней</small></div>
      <div class="time"><span id="h">00</span><small>часов</small></div>
      <div class="time"><span id="m">00</span><small>минут</small></div>
      <div class="time"><span id="s">00</span><small>секунд</small></div>
    </div>

  </div>

  <script src="timer.js"></script>
</body>
</html>
